{% extends 'base.html'%}
{% block content%}
<h2>Editar registro</h2>
<form action="/update" method="post">
    <input type="hidden" name="id" value="{{ persona.id }}">

    <div class="mb-3">
        <label for="" class="form-label">Nombre</label>
        <input type="text" class="form-control" name="nombre" value="{{ persona.nombre }}" required>
    </div>
    <div class="mb-3">
        <label for="" class="form-label">Telefono</label>
        <input type="text" class="form-control" name="telefono" value="{{persona.telefono}}" required>

    </div>
    <div class="mb-3">
        <label for="" class="form-label">Fecha Nacimiento</label>
        <input type="date" class="form-control" name="fecha_nac" value="{{ persona.fecha_nac }}" required>
    </div>
    <button type="submit" class="btn btn-warning">Actualizar</button>
</form>
{% endblock %}
